{% extends 'layout.html'%}  <!--filho de layout -->

<!--utilizando o centred hero bootstrap 5 -->
{% block head%}
    <title>Dicionário Médico</title>
{% endblock %}


{% block body%}
  <div class="px-4 py-5 my-5 text-center">
    <h1 class="display-5 fw-bold">Dicionário Médico</h1>
    <div class="col-lg-6 mx-auto">
      <p class="lead mb-4">Explore conceitos médicos de A-Z de forma simples e organizada.</p>
      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="/conceitos" class="btn btn-primary btn-lg px-4 gap-3">Explorar conceitos</a>
        </div>
        <div class="mt-4">
            {% for letra in "ABCDEFGHIJKLMNOPQRSTUVWXYZ" %}
                <a href="/conceitos?letra={{letra}}" class="btn btn-outline-primary btn-sm m-1">
                    {{letra}}
                </a>
            {% endfor %}
        </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
